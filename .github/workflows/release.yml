name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1). Must already exist as a git tag."
        required: true

permissions:
  contents: write

jobs:
  build:
    # Build on the oldest-supported Ubuntu to get the widest glibc compatibility.
    # Binaries built on newer Ubuntu won't run on older systems because of
    # GLIBC_* versioned symbols. Ubuntu 22.04 ships glibc 2.35 — covers most
    # current distros (Arch, Fedora 36+, Debian 12+, Ubuntu 22.04+).
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (GTK4)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libglib2.0-dev pkg-config build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target "$TARGET"

      - name: Strip and package
        run: |
          cd "target/$TARGET/release"
          strip copyninja
          ARCHIVE="copyninja-$TARGET.tar.gz"
          tar czf "$ARCHIVE" copyninja
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            target/${{ matrix.target }}/release/copyninja-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/copyninja-${{ matrix.target }}.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
